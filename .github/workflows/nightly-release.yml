name: Nightly Release

on:
  schedule:
    # 3:00 AM AEST (UTC+10) = 17:00 UTC previous day
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for ${TAG}. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_suffix: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_suffix: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-relay-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-relay-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          BINARY="target/${{ matrix.target }}/release/bilbycast-relay"
          ARTIFACT="bilbycast-relay-${{ matrix.artifact_suffix }}"
          cp "${BINARY}" "${ARTIFACT}"
          chmod +x "${ARTIFACT}"
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilbycast-relay-${{ matrix.artifact_suffix }}
          path: |
            bilbycast-relay-${{ matrix.artifact_suffix }}
            bilbycast-relay-${{ matrix.artifact_suffix }}.sha256
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            --title "bilbycast-relay v${VERSION}" \
            --notes "Release of bilbycast-relay version ${VERSION}.

          ## Binaries (static musl — no runtime dependencies)
          - \`bilbycast-relay-x86_64-linux\` — Linux x86_64 (amd64)
          - \`bilbycast-relay-aarch64-linux\` — Linux ARM64 (aarch64)

          Verify checksums:
          \`\`\`
          sha256sum -c bilbycast-relay-x86_64-linux.sha256
          sha256sum -c bilbycast-relay-aarch64-linux.sha256
          \`\`\`" \
            artifacts/bilbycast-relay-x86_64-linux \
            artifacts/bilbycast-relay-x86_64-linux.sha256 \
            artifacts/bilbycast-relay-aarch64-linux \
            artifacts/bilbycast-relay-aarch64-linux.sha256
